<!DOCTYPE html>
<html>
<head>
  <title>OINK Pre-Order</title>

  <style>
    body {
      font-family: Tahoma;
      background-color: #f4f4f4;
    }

    .container {
      width: 500px;
      margin: auto;
      background: pink;
      padding: 25px;
      border-radius: 8px;
      margin-top: 50px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, select {
      width: 95%;
      padding: 8px;
      margin: 7px 1px;
    }

    #terms {
      width: auto;
    }

    button {
      padding: 10px;
      width: 100%;
      margin-top: 5px;
      background-color: rgb(187, 127, 138);
      color: rgb(255, 255, 255);
      font-size: 16px;
      border: none;
      border-radius: 3px;
      transition: all 0.4s ease;
    }

    button:hover {
        background-color: rgb(255, 255, 255);
        color: rgb(216, 155, 155);
    }

    .error {
      color: red;
      margin-bottom: 10px;
      min-height: 18px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>OINK Pre-Order Form</h2>
  <p>
    The Olfactory Inhalation Kit (OINK) is a modern, portable way of delivering
    traditional tuob remedy for respiratory relief.
  </p>

  <div id="errorMsg" class="error"></div>

  <form onsubmit="return handleOrder()">

    <label>Name:</label>
    <input type="text" id="name">

    <label>Product:</label>
    <select id="variant">
      <option value="">Select</option>
      <option value="50 pcs (PHP 80)">50 pcs (PHP 80)</option>
      <option value="80 pcs (PHP 136)">80 pcs (PHP 136)</option>
    </select>

    <label>Quantity:</label>
    <input type="number" id="quantity">

    <label>Pickup Method:</label>
    <select id="pickup">
      <option value="">Select</option>
      <option value="Delivery">Delivery</option>
      <option value="Meetup">Meetup</option>
    </select>

    <label>Address (for delivery only):</label>
    <input type="text" id="address">

    <label>
      <input type="checkbox" id="terms">
      I accept terms
    </label>

    <br><br>

    <button type="button" onclick="loadPreviousOrder()">Load Previous Order</button>
    <button type="submit">Submit</button>

  </form>
</div>

<script>

function setCookie(name, value, maxAge) {
  document.cookie = name + "=" + encodeURIComponent(value) +
    "; max-age=" + maxAge + "; path=/";
}

function getCookie(name) {
  let cookies = document.cookie.split(";");
  for (let c of cookies) {
    let pair = c.split("=");
    if (pair[0].trim() === name) {
      return decodeURIComponent(pair[1]);
    }
  }
  return "";
}

function handleOrder() {

  let name = document.getElementById("name").value.trim();
  let variant = document.getElementById("variant").value;
  let quantity = document.getElementById("quantity").value;
  let pickup = document.getElementById("pickup").value;
  let address = document.getElementById("address").value.trim();
  let terms = document.getElementById("terms").checked;

  let errorBox = document.getElementById("errorMsg");
  errorBox.innerHTML = "";

  if (!name || !variant || !quantity || !pickup) {
    errorBox.innerHTML = "All fields must not be empty.";
    return false;
  }

  if (quantity <= 0) {
    errorBox.innerHTML = "Quantity must be greater than 0.";
    return false;
  }

  if (pickup === "Delivery" && address === "") {
    errorBox.innerHTML = "Address is required for delivery.";
    return false;
  }

  if (!terms) {
    errorBox.innerHTML = "You must accept the terms.";
    return false;
  }

  setCookie("name", name, 3600);
  localStorage.setItem("variant", variant);
  localStorage.setItem("quantity", quantity);
  localStorage.setItem("pickup", pickup);
  localStorage.setItem("address", address);

  window.location.href = "summary.html";
  return false;
}


function loadPreviousOrder() {

  let name = getCookie("name");

  let variant = localStorage.getItem("variant");
  let quantity = localStorage.getItem("quantity");
  let pickup = localStorage.getItem("pickup");
  let address = localStorage.getItem("address");

  if (!name && !variant) {
    document.getElementById("errorMsg").innerHTML = "No previous order data.";
    return;
  }

  document.getElementById("name").value = name || "";
  document.getElementById("variant").value = variant || "";
  document.getElementById("quantity").value = quantity || "";
  document.getElementById("pickup").value = pickup || "";
  document.getElementById("address").value = address || "";

  document.getElementById("errorMsg").innerHTML = "Previous order loaded!";
}

</script>

</body>
</html>
